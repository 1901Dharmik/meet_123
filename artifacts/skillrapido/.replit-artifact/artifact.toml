kind = "web"
previewPath = "/"
title = "SkillRapido - Service Marketplace"
version = "1.0.0"
id = "artifacts/skillrapido"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24403

[services.development]
run = "pnpm --filter @workspace/skillrapido run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/skillrapido", "run", "build" ]
publicDir = "artifacts/skillrapido/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24403"
BASE_PATH = "/"
